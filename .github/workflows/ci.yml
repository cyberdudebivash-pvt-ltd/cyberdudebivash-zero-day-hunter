name: V1.0 ULTRA PIPELINE
on: [push, pull_request]

jobs:
  # PHASE 1: CORE KERNEL VERIFICATION
  build-zig-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Zig v0.13.0
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0
      - name: Build Unified Runtime
        run: zig build --summary all

  # PHASE 2: INTELLIGENCE AGENT VALIDATION
  test-python-agents:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest
      - name: Validate Behavioral Hunters
        run: pytest agent/hunters/

  # PHASE 3: PRODUCTION ARTIFACT GENERATION
  release-binary:
    needs: [build-zig-core, test-python-agents]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0
      - name: Build Optimized Binary
        run: zig build -Doptimize=ReleaseFast
      - name: Upload Command Center Binary
        uses: actions/upload-artifact@v4
        with:
          name: CDB-ZeroDay-Hunter-Binary
          path: zig-out/bin/
